<!DOCTYPE html>

<head>

  <link href="./output.css" rel="stylesheet">

</head>

<body>
  <!-- Navbar -->
  <nav class="p-3 flex bg-white justify-between items-center font-display">

      <span class="text-lg font-medium">ToDesktop</span>

    <!-- Nav Menu -->
    <div id="nav-menu" class="hidden lg:flex gap-12 ">

        <a href="#" id="brand" class="flex gap-2 items-center">
